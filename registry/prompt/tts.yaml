voice-clone:
  class: audio_evals.prompt.base.Prompt
  args:
    template:
      text: "{{text}}"
      prompt_audio: "{{WavPath}}"
      prompt_text: "{{prompt_text}}"

cosyvoice3-vc:
  class: audio_evals.prompt.base.Prompt
  args:
    template:
      text: "{{text}}"
      prompt_audio: "{{WavPath}}"
      prompt_text: "You are a helpful assistant.<|endofprompt|>{{prompt_text}}"

