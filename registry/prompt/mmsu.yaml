mmsu:
  class: audio_evals.prompt.base.Prompt
  args:
    template:
      - role: user
        contents:
          - type: text
            value: "Choose the most suitable answer from options A, B, C, and D to respond the question in next line, **you should only choose A or B or C or D.** Do not provide any additional explanations or content.\n\nQuestion: {{question}}\n\nA. {{choice_a}}\nB. {{choice_b}}\nC. {{ choice_c | default('None') }}\nD. {{ choice_d | default('None') }}"
          - type: audio
            value: "{{WavPath}}"
          